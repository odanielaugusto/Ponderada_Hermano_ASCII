name: ASCII Art CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Pytest
        run: pytest --junitxml=artifacts/junit.xml

      - name: Write run metadata
        if: always()
        run: >
          python scripts/write_run_metadata.py
          --junit artifacts/junit.xml
          --out artifacts/run-metadata.json

      - name: Upload test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ascii-art-ci-results-${{ github.run_id }}
          path: artifacts/

  summarize:
    name: summarize
    runs-on: ubuntu-latest
    needs: [lint, tests]
    if: always()
    steps:
      - name: Download test artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ascii-art-ci-results-*
          path: artifacts
          merge-multiple: true

      - name: Show run metadata
        if: always()
        run: |
          echo "Workflow run: $GITHUB_RUN_ID"
          if [ -f artifacts/run-metadata.json ]; then
            cat artifacts/run-metadata.json
          fi
